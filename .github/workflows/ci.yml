name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - gh-pages

jobs:
  fixture-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build fixture site
        run: npm run build:fixture
